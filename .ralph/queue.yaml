  - id: RQ-0005
    status: todo
    title: Make Rust CLI defaults come from `.ralph/config.yaml` (runner/model/effort) instead of hardcoded flags
    tags:
      - rust
      - config
      - ux
    scope:
      - crates/ralph/src/config.rs
      - crates/ralph/src/main.rs
      - crates/ralph/src/runner.rs
      - ralph config
      - ralph scan
      - ralph task build
    evidence:
      - "`crates/ralph/src/main.rs` hardcodes defaults for flags like `scan --model` (default `gpt-5.2`) and `scan --effort` (default `high`) instead of using resolved config defaults."
      - "`crates/ralph/src/config.rs::resolve_from_cwd` loads `.ralph/config.yaml` (when present) and already resolves agent defaults (runner/model/reasoning_effort)."
      - "Hardcoded defaults drift from config defaults (see `crates/ralph/src/contracts.rs::Config::default` vs `ScanArgs` defaults), making runs inconsistent across machines."
    plan:
      - Change CLI args to optional overrides (no default_value in clap) and compute effective runner/model/effort from resolved config in `handle_scan` and `handle_task`.
      - Ensure `runner::validate_model_for_runner` still runs after resolution and produces a clear error on invalid combinations.
      - Add tests covering default resolution with and without `.ralph/config.yaml`.
      - "Update `--help` text to document precedence: CLI flags override repo config, which overrides global config, which overrides defaults."
