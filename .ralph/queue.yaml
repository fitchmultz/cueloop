- id: RQ-0115
  status: todo
  title: Fix panic potential in gitutil::upstream_ref() when git rev-parse output is unexpected
  tags:
  - rust
  - safety
  - bug
  scope:
  - crates/ralph/src/gitutil.rs
  evidence:
  - gitutil.rs:259 - Returns Ok(value) after trim() without checking if value is empty
  - gitutil.rs:261 - Returns Err(NoUpstreamConfigured) if value is empty, but this happens after trim
  - 'Race condition: if stdout is "  " (whitespace only), returns empty string then error on next call'
  - No test coverage for whitespace-only upstream ref output
  plan:
  - Check for empty string immediately after trim before returning Ok()
  - Add test case for git rev-parse returning only whitespace
  - Document expected git rev-parse output format in comments
  - Consider using .is_empty() check before .trim()
  notes: []
