  - id: RQ-0119
    status: todo
    title: Implement task search and filter by content patterns
    tags:
      - rust
      - ux
      - search
    scope:
      - crates/ralph/src/queue.rs
      - crates/ralph/src/main.rs
    evidence:
      - queue list supports filtering by status, tag, and scope but not by title/content
      - Cannot search for "all tasks mentioning 'database'"
      - Full-text search across task descriptions would be powerful
    plan:
      - Add queue search <query> command
      - Implement substring match against title, evidence, plan, notes
      - Support regex search with --regex flag
      - Add --match-case for case-sensitive search (default insensitive)
      - Add tests for search accuracy and performance
    notes: []
