- id: RQ-0118
  status: todo
  title: Implement deadlock detection and prevention in queue lock acquisition
  tags:
  - rust
  - safety
  - reliability
  scope:
  - crates/ralph/src/fsutil.rs
  - crates/ralph/src/queue.rs
  evidence:
  - fsutil.rs:40-106 - acquire_dir_lock() has no timeout mechanism for non-stale locks
  - fsutil.rs:67 - Only checks staleness via pid_is_running(), no lock age check
  - No detection of self-deadlock (same process trying to acquire lock twice)
  - run_cmd.rs:75 and scan_cmd.rs:21 and task_cmd.rs:47 all acquire locks but no nested lock prevention
  plan:
  - Add current process PID check to prevent self-deadlock
  - Add lock age timestamp check (e.g., fail if lock held > 1 hour)
  - Add timeout option to lock acquisition with configurable duration
  - Add tests for deadlock scenarios and timeout behavior
  notes: []
  request: scan finding
  created_at: 2025-01-19T12:00:00Z
  updated_at: 2025-01-19T12:00:00Z
