tasks:
- id: RQ-0108
  status: todo
  title: Fix unsafe block in runner.rs that can cause SIGFPE on stale lock cleanup
  tags:
  - rust
  - safety
  - bug
  scope:
  - crates/ralph/src/runner.rs
  - crates/ralph/src/fsutil.rs
  evidence:
  - fsutil.rs:96 - `unwrap()` on Option conversion can panic on None value
  - fsutil.rs:65 - `is_some_and()` used but unwrap still called without checking
  - runner.rs:613 - Similar unsafe libc::kill call pattern without proper error handling
  - Stale lock cleanup path uses unwrap() which defeats the safety of is_some_and() check
  plan:
  - Replace unwrap() with proper error handling or unwrap_or_default()
  - Add tests for stale lock cleanup scenario to verify safe behavior
  - Review all unwrap() calls in fsutil.rs and runner.rs for safety
  notes: []
  request: scan finding
  created_at: 2025-01-19T12:00:00Z
  updated_at: 2025-01-19T12:00:00Z
