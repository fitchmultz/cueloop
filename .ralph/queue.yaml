- id: RQ-0132
  status: todo
  title: Fix potential integer overflow in task ID parsing with very large numbers
  tags:
  - rust
  - safety
  - correctness
  scope:
  - crates/ralph/src/queue.rs
  evidence:
  - queue.rs:752-763 - parse_any_task_id() returns u32 which limits to ~4 billion tasks
  - queue.rs:1209 - Task ID numeric suffix parsed as u32 without overflow checking
  - queue.rs:185 - next_id_across() uses saturating_add(1) but this silently caps at u32::MAX
  - No warning or error when approaching u32::MAX task IDs
  plan:
  - Add checked arithmetic for task ID increment that returns error on overflow
  - Add warning when task count exceeds 50% of u32::MAX
  - Consider using u64 for task IDs to allow for more headroom
  - Add test for behavior when task ID would overflow
  notes: []
  request: scan finding
  created_at: 2025-01-19T12:00:00Z
  updated_at: 2025-01-19T12:00:00Z
