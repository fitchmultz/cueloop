version: 1
tasks:

  - id: RQ-0021
    status: todo
    title: Redact PRIVATEKEY env values consistently with other secret patterns
    tags:
      - safety
      - redaction
      - security
    scope:
      - crates/ralph/src/redaction.rs
      - crates/ralph/src/queue.rs
    evidence:
      - crates/ralph/src/redaction.rs looks_sensitive_env_key does not flag PRIVATEKEY as sensitive, but looks_sensitive_label treats PRIVATEKEY as sensitive.
      - redact_sensitive_env_values relies on looks_sensitive_env_key, so PRIVATEKEY env values are not scrubbed from notes or output.
    plan:
      - Update looks_sensitive_env_key to treat PRIVATEKEY as sensitive (or normalize rules so label and env behavior match).
      - Adjust tests to assert PRIVATEKEY redaction for both labels and env values.
      - Verify redaction still avoids path-like keys such as PATH.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0035
    status: todo
    title: Emit actionable errors when queue or done files are missing
    tags:
      - ux
      - queue
      - workflow
    scope:
      - crates/ralph/src/queue.rs
      - crates/ralph/src/main.rs
    evidence:
      - queue::load_queue returns a raw read_to_string error when .ralph/queue.yaml is missing, and CLI commands do not suggest running ralph init or specify expected paths.
    plan:
      - Detect missing queue/done files and return a clear error that points to ralph init and config paths.
      - Keep the error context for other IO failures unchanged.
      - Add tests for missing file messaging in at least one queue command path.
    request: scan finding
    created_at: 2026-01-18T04:01:58Z
    updated_at: 2026-01-18T04:01:58Z
  - id: RQ-0036
    status: todo
    title: Only report added tasks when scan/task builder succeed
    tags:
      - ux
      - scan
      - task-builder
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/task_cmd.rs
    evidence:
      - scan_cmd::run_scan and task_cmd::build_task print added tasks before checking output.success, then revert and error on failure, which produces misleading success output.
    plan:
      - Move the added-tasks reporting behind the output.success check.
      - On failure, emit a message that changes were reverted (if any).
      - Add tests covering both success and failure messaging paths.
    request: scan finding
    created_at: 2026-01-18T04:01:58Z
    updated_at: 2026-01-18T04:01:58Z
  - id: RQ-0022
    status: todo
    title: Emit redacted output tails on scan and task builder failures
    tags:
      - ux
      - scan
      - task-builder
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/task_cmd.rs
      - crates/ralph/src/redaction.rs
    evidence:
      - crates/ralph/src/scan_cmd.rs and crates/ralph/src/task_cmd.rs only report exit reasons on failure; they do not print redacted output tails like run_cmd does.
    plan:
      - Reuse run_cmd tail_lines and redaction logic to show a short, redacted output tail when scan or task build fails.
      - Keep output length bounded and consistent with run_cmd defaults.
      - Add tests to confirm output is shown and secrets are redacted.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0044
    status: todo
    title: Validate prompt rendering leaves no unresolved placeholders
    tags:
      - prompts
      - safety
      - ux
    scope:
      - crates/ralph/src/prompts.rs
      - crates/ralph/assets/prompts
    evidence:
      - render_worker_prompt, render_task_builder_prompt, and render_scan_prompt do not check for leftover {{PLACEHOLDER}} tokens after rendering, so prompt overrides can silently ship with missing substitutions.
    plan:
      - Add a shared validation that scans rendered prompts for unreplaced placeholders.
      - Fail fast with a clear error listing the missing tokens.
      - Add tests to assert the validation catches stray placeholders.
    request: scan finding
    created_at: 2026-01-18T04:01:58Z
    updated_at: 2026-01-18T04:01:58Z
  - id: RQ-0023
    status: todo
    title: Wire project_type into prompt rendering and workflow behavior
    tags:
      - config
      - prompts
      - ux
    scope:
      - crates/ralph/src/config.rs
      - crates/ralph/src/prompts.rs
      - README.md
    evidence:
      - README.md states project_type tunes prompts and workflows, but rg -n project_type shows it is only defined and loaded, not used anywhere in runtime logic.
    plan:
      - Decide how project_type should influence prompts or behavior (e.g., select different defaults or insert guidance blocks).
      - Update prompt rendering to incorporate project_type and add tests for both code and docs modes.
      - Document the behavior clearly in README.md and .ralph/README.md.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0029
    status: todo
    title: Add queue list scope filtering to improve navigation
    tags:
      - queue
      - ux
      - cli
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
    evidence:
      - QueueListArgs supports status and tag filters but there is no scope filter, and queue::filter_tasks only filters by status and tags.
    plan:
      - Add a repeatable --scope filter and implement matching in queue::filter_tasks.
      - Keep filter behavior case-insensitive and whitespace-tolerant.
      - Add tests for scope filtering with multiple scopes.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0039
    status: todo
    title: Allow queue show to search the done archive
    tags:
      - queue
      - ux
      - cli
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - ralph queue show
    evidence:
      - handle_queue QueueCommand::Show only searches the active queue file and cannot display tasks that have been archived in .ralph/done.yaml.
    plan:
      - Add a flag (or default fallback) to search done.yaml when a task is not found in the active queue.
      - Keep output format consistent with existing show formats.
      - Add tests covering active-only, done-only, and not-found cases.
    request: scan finding
    created_at: 2026-01-18T04:01:58Z
    updated_at: 2026-01-18T04:01:58Z
  - id: RQ-0040
    status: todo
    title: Add queue list support for the done archive
    tags:
      - queue
      - ux
      - cli
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - ralph queue list
    evidence:
      - QueueCommand::List loads only the active queue file and ignores .ralph/done.yaml, so archived tasks are not listable via CLI.
    plan:
      - Add a flag to include done.yaml in list output or a separate mode for listing archived tasks.
      - Ensure filters (status/tag/scope) apply consistently across both sources.
      - Add tests for list output with and without the archive.
    request: scan finding
    created_at: 2026-01-18T04:01:58Z
    updated_at: 2026-01-18T04:01:58Z
  - id: RQ-0025
    status: todo
    title: Add a long or formatted queue list output with tags and scope
    tags:
      - ux
      - queue
      - cli
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - ralph queue list
    evidence:
      - crates/ralph/src/main.rs uses format_task_compact for queue list output, which only prints id, status, and title.
    plan:
      - Add a --format or --long flag to include tags, scope, and timestamps in list output.
      - Keep the default compact output for script-friendliness.
      - Add tests covering both output formats.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
