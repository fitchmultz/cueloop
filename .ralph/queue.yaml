tasks:
  - id: RQ-0111
    status: todo
    title: Add task priority field and sorting capabilities
    tags:
      - rust
      - queue
      - ux
    scope:
      - crates/ralph/src/contracts.rs
      - crates/ralph/src/queue.rs
      - crates/ralph/src/main.rs
    evidence:
      - Queue is ordered by priority but there is no explicit priority field
      - Tasks must be manually reordered by editing YAML
      - No way to sort by "importance" without manual reordering
    plan:
      - "Add priority field to Task (enum: critical, high, medium, low)"
      - Add queue sort --by=priority command
      - Add queue list --sort-by=priority flag
      - Update task build and scan prompts to request priority from agent
      - Add tests for priority sorting and validation
    notes: []
    request: scan finding
    created_at: 2025-01-19T12:00:00Z
    updated_at: 2025-01-19T12:00:00Z
    depends_on: []
  - id: RQ-0118
    status: todo
    title: Add task statistics and reporting commands
    tags:
      - rust
      - ux
      - analytics
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
    evidence:
      - No way to get aggregate stats about task completion rates
      - Cannot see average task duration, success/failure ratios, or tag distribution
      - Historical analysis requires manual YAML parsing
    plan:
      - Add ralph queue stats command with completion rate, avg duration, tag breakdown
      - Add ralph queue history command to show task creation/completion timeline
      - Add ralph queue burndown command to show velocity chart
      - Calculate duration from created_at to completed_at in done tasks
      - Add tests for stats calculation accuracy
    notes: []
    request: scan finding
