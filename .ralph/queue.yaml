  - id: RQ-0012
    status: todo
    title: Add runner inactivity timeout + reset semantics to Rust loop (requires streaming runner output)
    tags:
      - rust
      - run-loop
      - safety
    scope:
      - crates/ralph/src/runner.rs
      - crates/ralph/src/run_cmd.rs
      - ralph_tui/internal/loop/loop_inactivity_test.go
      - ralph_tui/internal/loop/loop.go
      - ralph run
    evidence:
      - "The Go loop runner supports inactivity resets (`loop.runner_inactivity_seconds`) and has regression coverage (see `ralph_tui/internal/loop/loop_inactivity_test.go`)."
      - "The Rust runner captures full output via `wait_with_output` (`crates/ralph/src/runner.rs::run_codex` and `run_opencode`), so it cannot detect a 'no output for N seconds' condition."
      - "Without streaming output, a long-running or stalled runner can hang `ralph run` indefinitely and/or buffer unbounded output in memory."
    plan:
      - Refactor `runner::run_prompt` to stream stdout/stderr while the child runs (track last-output timestamp).
      - Add an inactivity timeout option for `ralph run loop` / `ralph run one` that cancels the runner when no output is observed for N seconds.
      - Implement reset-to-known-good semantics on inactivity (mirroring the Go behavior) and ensure the queue item is restarted/requeued safely.
      - Add tests that simulate inactivity (e.g. helper runner that stops producing output) and assert the repo is clean after reset.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
