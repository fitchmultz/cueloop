      - make ci
    evidence:
      - "The repo has a Rust workspace (`Cargo.toml` with member `crates/ralph`), but the root `Makefile` only runs Go checks under `ralph_tui/`."
      - "The Rust CLI is the mechanism used by `.ralph/prompts/*.md` (`ralph queue next-id`, `ralph scan`, etc.), so missing Rust checks in `make ci` is a workflow gap."
    plan:
      - "Add Makefile targets for Rust: `rust-build`, `rust-test`, `rust-format` (cargo fmt), and `rust-lint` (cargo clippy)."
      - Update `make ci` to run both Go and Rust gates (or introduce `make ci-rust` and make `ci` depend on both).
      - Ensure commands run from repo root and respect workspace conventions.
      - Document the new targets briefly in `README.md`.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0006
    status: todo
    title: Strengthen `ralph queue validate` with timestamp and status invariants
    tags:
      - rust
      - queue
      - safety
    scope:
      - crates/ralph/src/queue.rs
      - crates/ralph/src/contracts.rs
      - crates/ralph/src/timeutil.rs
      - ralph queue validate
    evidence:
      - "`crates/ralph/src/queue.rs::validate_task_required_fields` enforces non-empty `tags/scope/evidence/plan` but does not validate `created_at/updated_at/completed_at` format or presence."
      - "`crates/ralph/src/contracts.rs` stores timestamps as RFC3339 strings for tool-agnostic YAML, but there is currently no validation that strings are valid RFC3339."
      - "`crates/ralph/src/queue.rs::set_status` sets `completed_at` when marking `done`, but invalid or missing timestamps on tasks would currently pass `ralph queue validate`."
    plan:
      - Parse timestamps with the `time` crate (RFC3339) during validation when fields are present; fail with precise task index/id on error.
      - Add status invariants to `validate_queue` (e.g. `done` requires `completed_at`, `blocked` requires `blocked_reason`, `todo/doing` must not have `completed_at`).
      - Validate monotonicity constraints where possible (e.g. `updated_at` should be >= `created_at` when both exist).
      - Add unit tests covering invalid timestamps, missing invariants, and valid queues.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0007
    status: todo
    title: Improve `ralph queue set-status` ergonomics (clear blocked reason, add note-only, consistent timestamps)
    tags:
      - rust
      - queue
      - ux
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - ralph queue set-status
    evidence:
      - "`crates/ralph/src/main.rs` exposes `ralph queue set-status --reason/--note`, but there is no dedicated command to append notes without changing status."
      - "`crates/ralph/src/queue.rs::set_status` only updates `blocked_reason` when a non-empty `reason` is provided; when status remains `blocked` and `--reason` is omitted/empty, an existing `blocked_reason` cannot be cleared."
      - "`crates/ralph/src/queue.rs::set_status` sets `updated_at`, but `ralph queue validate` currently does not enforce timestamp invariants (see `crates/ralph/src/queue.rs::validate_queue`)."
    plan:
      - Add explicit CLI support to clear fields (`--clear-reason`, `--clear-notes` or targeted note removal) with safe defaults.
      - Add `ralph queue note <TASK_ID> --note ...` to append notes without changing status.
      - Ensure status transitions consistently manage `completed_at` and `blocked_reason`, and always update `updated_at`.
      - Add tests for blocked_reason clearing, note-only appends, and timestamp updates.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0008
    status: todo
