version: 1
tasks:
  - id: RQ-0003
    status: todo
    title: Add Rust bootstrap command to create `.ralph/queue.yaml` and `.ralph/config.yaml` when missing
    tags:
      - rust
      - cli
      - onboarding
    scope:
      - crates/ralph/src/config.rs
      - crates/ralph/src/queue.rs
      - crates/ralph/src/main.rs
      - .ralph/README.md
      - ralph init
      - ralph config
    evidence:
      - "The Rust CLI supports layered YAML config at `.ralph/config.yaml` via `crates/ralph/src/config.rs`, but this repo currently has no `.ralph/config.yaml`."
      - "`crates/ralph/src/queue.rs::load_queue` requires the queue file to exist; there is no Rust `init` command to create a valid empty queue (`version: 1`, `tasks: []`)."
      - "`.ralph/README.md` describes `.ralph/queue.yaml` as the source of truth for Rust, but does not provide a bootstrap command/workflow."
    plan:
      - Add a Rust CLI command (`ralph init` or `ralph config init`) that creates `.ralph/queue.yaml` and `.ralph/config.yaml` if missing (no overwrite unless `--force`).
      - Ensure created files match the queue/config contracts and use atomic writes.
      - "Add tests covering: missing files, already-present files, and `--force` behavior."
      - Update `.ralph/README.md` to document the bootstrap workflow.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0015
    status: todo
    title: Redact secrets before persisting runner output into `.ralph/queue.yaml` notes
    tags:
      - rust
      - safety
      - queue
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/runner.rs
      - crates/ralph/src/contracts.rs
      - ralph_tui/internal/redaction
    evidence:
      - "`crates/ralph/src/run_cmd.rs` appends a tail of combined runner stdout/stderr into task `notes` when the runner fails."
      - "Persisting raw runner output into versioned repo state risks leaking secrets (tokens, keys, private URLs); the Go implementation includes a redaction layer (`ralph_tui/internal/redaction`)."
    plan:
      - Introduce a Rust redaction helper that can scrub common secret patterns and values from environment variables before writing to `Task.notes`.
      - Apply redaction to runner output tails and to any error strings persisted into `blocked_reason` or notes.
      - Add tests with representative secret-like strings to ensure redaction works and does not over-redact normal logs.
      - Consider a config/flag to disable persisting output tails entirely for high-security repos.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0008
    status: todo
    title: Add queue inspection (show, next, list) with filtering and compact output
    tags:
      - rust
      - queue
      - ux
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - crates/ralph/src/contracts.rs
      - ralph queue
    evidence:
      - "`crates/ralph/src/main.rs` implements only `queue validate|next-id|set-status`; there is no Rust CLI command to display a task by ID, show the next runnable task, or list tasks in a user-friendly way."
      - "`crates/ralph/src/run_cmd.rs` selects the first `todo` task internally, but users cannot inspect which task would run next without opening `.ralph/queue.yaml` manually."
      - "There is no queue listing command in the Rust CLI; users must open `.ralph/queue.yaml` or use the Go pin workflows (`.ralph/pin/*`)."
      - "Simple, script-friendly, and filterable list/show commands are critical to workflow migration and single-task UX."
    plan:
      - Add `ralph queue show <TASK_ID>` to print a task (YAML or human-readable) and exit non-zero if not found.
      - Add `ralph queue next` to print the next todo task's ID (and optionally title) according to current run selection logic.
      - Add `ralph queue list` to print queue as `ID  STATUS  TITLE` with stable queue-order, filterable by `--status`, `--tag`, and limitable via `--limit`/`--all`.
      - Add tests for not-found/empty queue cases, selection consistency, and all filtering/formatting behaviors.
      - Ensure all output is script-friendly (one task per line).
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0005
    status: todo
    title: Make Rust CLI defaults come from `.ralph/config.yaml` (runner/model/effort) instead of hardcoded flags
    tags:
      - rust
      - config
      - ux
    scope:
      - crates/ralph/src/config.rs
      - crates/ralph/src/main.rs
      - crates/ralph/src/runner.rs
      - ralph config
      - ralph scan
      - ralph task build
    evidence:
      - "`crates/ralph/src/main.rs` hardcodes defaults for flags like `scan --model` (default `gpt-5.2`) and `scan --effort` (default `high`) instead of using resolved config defaults."
      - "`crates/ralph/src/config.rs::resolve_from_cwd` loads `.ralph/config.yaml` (when present) and already resolves agent defaults (runner/model/reasoning_effort)."
      - "Hardcoded defaults drift from config defaults (see `crates/ralph/src/contracts.rs::Config::default` vs `ScanArgs` defaults), making runs inconsistent across machines."
    plan:
      - Change CLI args to optional overrides (no default_value in clap) and compute effective runner/model/effort from resolved config in `handle_scan` and `handle_task`.
      - Ensure `runner::validate_model_for_runner` still runs after resolution and produces a clear error on invalid combinations.
      - Add tests covering default resolution with and without `.ralph/config.yaml`.
      - "Update `--help` text to document precedence: CLI flags override repo config, which overrides global config, which overrides defaults."
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
