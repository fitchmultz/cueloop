version: 1
tasks:
  - id: RQ-0018
    status: todo
    title: Add dirty-repo preflight checks for runner-driven Rust commands (run/scan/task build)
    tags:
      - rust
      - safety
      - workflow
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/task_cmd.rs
      - crates/ralph/src/scan_cmd.rs
      - .ralph/prompts/worker.md
      - ralph_tui/cmd/ralph/main.go
    evidence:
      - "The worker prompt requires a clean working tree before starting work (see `.ralph/prompts/worker.md`), but the Rust CLI does not enforce this preflight."
      - "`crates/ralph/src/run_cmd.rs`, `task_cmd.rs`, and `scan_cmd.rs` run external automation in the repo root without checking `git status` first."
      - "The Go CLI exposes dirty repo policies for the loop runner (`dirty-start-policy`, `dirty-during-policy`) (see `ralph_tui/cmd/ralph/main.go` flags), but the Rust rewrite has no equivalent safeguards."
    plan:
      - Add a small git helper in Rust to detect a dirty working tree (configurable whether to count untracked files as dirty).
      - Enforce clean-repo preflight for `ralph run one`, `ralph scan`, and `ralph task build` by default, with an explicit override flag for power users.
      - Add tests using a temp git repo to cover clean vs dirty detection and untracked handling.
      - Document the behavior in `--help` output and `.ralph/README.md`.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0019
    status: todo
    title: Enforce queue-only edits for `ralph scan` and `ralph task build` (detect + rollback non-queue changes)
    tags:
      - rust
      - safety
      - scan
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/task_cmd.rs
      - crates/ralph/src/runner.rs
      - .ralph/prompts/scan.md
      - .ralph/prompts/task_builder.md
      - ralph scan
      - ralph task build
    evidence:
      - "Both `.ralph/prompts/scan.md` and `.ralph/prompts/task_builder.md` instruct the agent to modify `.ralph/queue.yaml` only, but the Rust CLI does not enforce this invariant."
      - "`crates/ralph/src/task_cmd.rs` and `crates/ralph/src/scan_cmd.rs` run an external runner and only validate the queue before/after; they never check for other file changes."
      - "`crates/ralph/src/runner.rs` invokes Codex with `--full-auto --sandbox workspace-write`, which permits edits anywhere in the workspace if the model deviates from instructions."
    plan:
      - Snapshot repo state before invoking the runner (git status + content hash of `.ralph/queue.yaml`).
      - After the runner exits, fail if any paths other than `.ralph/queue.yaml` changed; automatically rollback those changes and keep the queue consistent.
      - Add a safe escape hatch flag (e.g. `--allow-non-queue-changes`) that is off by default and clearly warned in `--help`.
      - Add integration tests using a temp git repo to ensure non-queue changes are detected and rolled back.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0017
    status: todo
    title: Make `ralph run one` failure-safe (never leave a task stuck in `doing` on internal errors)
    tags:
      - rust
      - run-loop
      - safety
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/runner.rs
      - crates/ralph/src/queue.rs
      - ralph run one
    evidence:
      - "`crates/ralph/src/run_cmd.rs` writes `status: doing` to `.ralph/queue.yaml` before calling `runner::run_prompt`; if `run_prompt` returns an error (spawn failure, IO error), the function returns early and the task can remain stuck in `doing`."
      - "`runner::run_prompt` can fail before producing a `RunnerOutput` (e.g. `Command::spawn` errors in `crates/ralph/src/runner.rs`), which is not handled as a status transition today."
    plan:
      - Refactor `run_one` to ensure any error after marking a task `doing` results in a deterministic queue update (block or revert) with a clear reason.
      - Treat runner spawn/IO errors similarly to non-zero exit codes by marking the task `blocked` and appending a concise (redacted) diagnostic note.
      - Add tests that simulate runner spawn failure and assert the queue does not contain a stuck `doing` task afterward.
      - Keep queue writes atomic and avoid losing concurrent edits (add file lock if needed).
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0016
    status: todo
    title: Verify `ralph run one` completion by checking the task status changed from `doing`
    tags:
      - rust
      - run-loop
      - safety
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/prompts.rs
      - .ralph/prompts/worker.md
      - ralph run one
    evidence:
      - "`crates/ralph/src/run_cmd.rs` sets the selected task to `doing`, runs the external runner, and if the process exits 0 it prints success and returns without verifying the task was marked `done` or otherwise updated."
      - "The worker prompt requires the agent to update `.ralph/queue.yaml` status and timestamps (see `.ralph/prompts/worker.md`), but `ralph run one` does not enforce or verify this invariant."
    plan:
      - After the runner exits successfully, reload `.ralph/queue.yaml` and verify the task is no longer `doing` (expect `done` or `blocked`).
      - "If the task remains `doing`, treat it as a failed run: mark it `blocked` (or revert to `todo`) with a clear reason and append a note about the missing queue update."
      - Add tests that simulate a runner which exits 0 without editing the queue, and assert the CLI enforces the invariant.
      - Update `.ralph/prompts/worker.md` if needed to make the expectation explicit and machine-checkable.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0015
    status: todo
    title: Redact secrets before persisting runner output into `.ralph/queue.yaml` notes
    tags:
      - rust
      - safety
      - queue
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/runner.rs
      - crates/ralph/src/contracts.rs
      - ralph_tui/internal/redaction
    evidence:
      - "`crates/ralph/src/run_cmd.rs` appends a tail of combined runner stdout/stderr into task `notes` when the runner fails."
      - "Persisting raw runner output into versioned repo state risks leaking secrets (tokens, keys, private URLs); the Go implementation includes a redaction layer (`ralph_tui/internal/redaction`)."
    plan:
      - Introduce a Rust redaction helper that can scrub common secret patterns and values from environment variables before writing to `Task.notes`.
      - Apply redaction to runner output tails and to any error strings persisted into `blocked_reason` or notes.
      - Add tests with representative secret-like strings to ensure redaction works and does not over-redact normal logs.
      - Consider a config/flag to disable persisting output tails entirely for high-security repos.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-17T17:26:38Z
  - id: RQ-0014
    status: todo
    title: Extend root `Makefile` so `make ci` gates the Rust rewrite (cargo fmt/clippy/test/build)
    tags:
      - rust
      - workflow
      - ci
    scope:
      - Makefile
      - Cargo.toml
