  - id: RQ-0139
    status: todo
    title: Implement task lifecycle hooks and triggers
    tags:
      - rust
      - automation
      - hooks
    scope:
      - crates/ralph/src/contracts.rs
      - crates/ralph/src/run_cmd.rs
    evidence:
      - No way to run custom scripts on task state transitions
      - Cannot trigger notifications or external actions when tasks complete
      - Automation requires manual intervention after each task
    plan:
      - Add hooks.on_task_start, hooks.on_task_complete, hooks.on_task_fail to Config
      - Define hooks as command lists to execute
      - Run hooks in run_cmd at appropriate lifecycle points
      - Pass task context as env vars (RALPH_TASK_ID, RALPH_STATUS, etc.)
      - Add hook validation to prevent infinite loops or dangerous commands
      - Add tests for hook execution and error handling
    notes: []
    request: scan finding
    created_at: 2025-01-19T12:00:00Z
    updated_at: 2025-01-19T12:00:00Z
    depends_on: []
