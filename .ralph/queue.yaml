version: 1
tasks:
  - id: RQ-0016
    status: todo
    title: Prevent scan from reverting dirty repos
    tags:
      - safety
      - scan
      - workflow
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/gitutil.rs
      - ralph scan
    evidence:
      - crates/ralph/src/scan_cmd.rs calls gitutil::revert_uncommitted on validation or runner errors but never calls gitutil::require_clean_repo, so a failed scan can wipe uncommitted user changes.
    plan:
      - Require a clean repo at the start of scan_cmd::run_scan to match task build and run behavior.
      - If the repo is dirty, exit with a clear error without calling revert_uncommitted.
      - Add coverage to ensure scans refuse to run when the repo is dirty.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0017
    status: todo
    title: Remove install from make ci to avoid writing binaries into the repo
    tags:
      - ci
      - workflow
      - safety
    scope:
      - Makefile
      - make ci
      - crates/ralph/src/run_cmd.rs
    evidence:
      - Makefile ci depends on install, and install falls back to writing target/release/ralph into .local/bin when the default bin dir is not writable.
      - crates/ralph/src/run_cmd.rs runs make ci before committing; the current Makefile can create untracked binaries and pollute commits.
    plan:
      - Remove install from the make ci dependency chain and keep install as an explicit user action.
      - If install must stay in ci, redirect output to a non-repo temp dir or add a gitignore policy that prevents repo pollution.
      - Update README or .ralph/README.md to clarify the CI gate and install behavior.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0018
    status: todo
    title: Skip push when no upstream is configured instead of failing run
    tags:
      - git
      - workflow
      - reliability
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/gitutil.rs
    evidence:
      - crates/ralph/src/gitutil.rs upstream_ref uses git rev-parse @{u} and errors if no upstream is set, while run_cmd calls is_ahead_of_upstream unconditionally after commit.
    plan:
      - Detect missing upstream and treat it as a non-fatal condition with a clear warning.
      - Ensure run_cmd still completes and leaves the repo clean when no upstream is configured.
      - Add tests covering no-upstream scenarios for is_ahead_of_upstream or the run_cmd flow.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0019
    status: todo
    title: Validate that done.yaml only contains done tasks and fix existing mismatch
    tags:
      - queue
      - safety
      - validation
    scope:
      - crates/ralph/src/queue.rs
      - .ralph/done.yaml
      - ralph queue validate
    evidence:
      - .ralph/done.yaml includes task RQ-0005 with status todo, but done.yaml is intended as the archive of completed tasks.
      - crates/ralph/src/queue.rs validate_queue_set only validates each file independently and does not enforce done-only status for the done archive.
    plan:
      - Add a validation step that enforces all tasks in done.yaml have status done.
      - Update queue validation tests to cover done-only enforcement and cross-file consistency.
      - Fix the existing done.yaml task status and ensure the archive stays consistent.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0020
    status: todo
    title: Align blocked status support with supervisor docs and CLI behavior
    tags:
      - queue
      - workflow
      - docs
    scope:
      - crates/ralph/src/contracts.rs
      - crates/ralph/src/main.rs
      - crates/ralph/src/run_cmd.rs
      - .ralph/README.md
    evidence:
      - .ralph/README.md says status blocked is not supported, yet TaskStatus includes Blocked and QueueCommand::SetStatus allows blocked.
      - crates/ralph/src/run_cmd.rs bails when a task is blocked, which conflicts with the CLI allowing the status.
    plan:
      - Decide on the single supported behavior for blocked tasks (disallow vs fully support).
      - Update task status enum, CLI parsing, and validation to enforce the chosen policy.
      - Align documentation and add tests covering blocked handling.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0021
    status: todo
    title: Redact PRIVATEKEY env values consistently with other secret patterns
    tags:
      - safety
      - redaction
      - security
    scope:
      - crates/ralph/src/redaction.rs
      - crates/ralph/src/queue.rs
    evidence:
      - crates/ralph/src/redaction.rs looks_sensitive_env_key does not flag PRIVATEKEY as sensitive, but looks_sensitive_label treats PRIVATEKEY as sensitive.
      - redact_sensitive_env_values relies on looks_sensitive_env_key, so PRIVATEKEY env values are not scrubbed from notes or output.
    plan:
      - Update looks_sensitive_env_key to treat PRIVATEKEY as sensitive (or normalize rules so label and env behavior match).
      - Adjust tests to assert PRIVATEKEY redaction for both labels and env values.
      - Verify redaction still avoids path-like keys such as PATH.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
  - id: RQ-0022
    status: todo
    title: Emit redacted output tails on scan and task builder failures
    tags:
      - ux
      - scan
      - task-builder
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/task_cmd.rs
      - crates/ralph/src/redaction.rs
    evidence:
      - crates/ralph/src/scan_cmd.rs and crates/ralph/src/task_cmd.rs only report exit reasons on failure; they do not print redacted output tails like run_cmd does.
    plan:
      - Reuse run_cmd tail_lines and redaction logic to show a short, redacted output tail when scan or task build fails.
      - Keep output length bounded and consistent with run_cmd defaults.
      - Add tests to confirm output is shown and secrets are redacted.
    request: scan finding
    created_at: 2026-01-18T03:41:10Z
    updated_at: 2026-01-18T03:41:10Z
