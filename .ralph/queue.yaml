  - id: RQ-0120
    status: todo
    title: Add interactive task selection and TUI mode
    tags:
      - rust
      - ux
      - tui
    scope:
      - crates/ralph/src/main.rs
      - Cargo.toml
    evidence:
      - All commands are non-interactive; users must copy-paste task IDs
      - No way to interactively select a task to run next
      - Terminal UI would improve workflow for browsing and selecting tasks
    plan:
      - Add --interactive/-i flag to run one and run loop
      - Use a TUI library (ratatui or termion) to show task browser
      - Allow arrow key navigation and task inspection
      - Support task actions (run, edit, delete) from TUI
      - Add tests for TUI mode (screen scraping or mock input)
    notes: []
    request: scan finding
