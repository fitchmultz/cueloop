  - id: RQ-0132
    status: todo
    title: Add environment variable interpolation in prompts
    tags:
      - rust
      - prompts
      - config
    scope:
      - crates/ralph/src/prompts.rs
    evidence:
      - Prompts are static; cannot reference env vars or config values
      - No way to customize prompts with project-specific values
      - 'Templates like "API endpoint: ${API_URL}" would be useful'
    plan:
      - Add env var interpolation to prompt rendering (e.g., ${VAR:-default})
      - Add config value interpolation (e.g., {{agent.runner}})
      - Support escaping with $${VAR} or \\${VAR}
      - Document supported variables in prompt override docs
      - Add tests for interpolation edge cases
    notes: []
    request: scan finding
    created_at: 2025-01-19T12:00:00Z
    updated_at: 2025-01-19T12:00:00Z
    depends_on: []
  - id: RQ-0138
    status: todo
    title: Add task validation rules and custom schemas
    tags:
      - rust
      - validation
      - config
    scope:
      - crates/ralph/src/config.rs
      - crates/ralph/src/queue.rs
    evidence:
      - Validation is hardcoded; teams cannot add custom rules
      - Cannot enforce project-specific constraints like "all tasks must have 'estimate'"
      - No way to require certain tags or forbid others
