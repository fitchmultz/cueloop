  - id: RQ-0121
    status: todo
    title: Implement task checkpoint and resume for long-running operations
    tags:
      - rust
      - reliability
      - state
    scope:
      - crates/ralph/src/run_cmd.rs
      - crates/ralph/src/contracts.rs
    evidence:
      - If Ralph crashes during a run loop, progress is lost
      - No checkpoint file to track which tasks are in-flight
      - Resume after crash requires manual inspection of queue state
    plan:
      - Add .ralph/state.yaml with current_task_id and phase
      - "Update state at key points: task started, CI passed, committing"
      - On Ralph startup, detect incomplete state and prompt to resume
      - Add ralph run resume command to continue interrupted run
      - Add tests for state checkpointing and recovery
    notes: []
    request: scan finding
    created_at: 2025-01-19T12:00:00Z
    updated_at: 2025-01-19T12:00:00Z
    depends_on: []
  - id: RQ-0122
    status: todo
    title: Add Git LFS (Large File Storage) detection and handling
    tags:
      - git
      - lfs
      - safety
    scope:
      - crates/ralph/src/gitutil.rs
      - crates/ralph/src/doctor_cmd.rs
    evidence:
      - Git LFS files are not detected; could cause unexpected behavior
      - No check for .gitattributes/lfs during doctor
      - Large files in LFS could affect performance and disk usage
    plan:
      - Add gitutil::has_lfs() to detect .git/lfs directory or .gitattributes LFS patterns
      - Add gitutil::list_lfs_files() to show tracked LFS files
      - Add LFS check to doctor command
      - Add warning during run if LFS files are modified
      - Add tests for LFS detection (requires LFS installation or mocking)
    notes: []
    request: scan finding
    created_at: 2025-01-19T12:00:00Z
    updated_at: 2025-01-19T12:00:00Z
    depends_on: []
  - id: RQ-0126
    status: todo
    title: Add task labeling and custom field support
    tags:
      - rust
      - queue
      - extensibility
    scope:
      - crates/ralph/src/contracts.rs
      - crates/ralph/src/queue.rs
    evidence:
      - "Tasks have fixed schema: id, status, title, tags, scope, evidence, plan, notes, request, agent, timestamps"
      - No way to attach custom metadata like "priority_score", "story_points", "sprint"
      - Teams using Ralph for project management may want custom fields
